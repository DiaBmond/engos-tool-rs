name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Compile against the committed .sqlx metadata rather than a live database.
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Format, lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib --bins

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eng_os_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: eng_os_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U eng_os_user -d eng_os_db"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgres://eng_os_user:ci_password@localhost:5432/eng_os_db
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Apply migrations
        run: |
          for f in migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      # Catches a schema or query change that was not re-prepared, which would
      # otherwise only fail in a database-less build such as the Docker image.
      - name: Verify .sqlx metadata is current
        env:
          SQLX_OFFLINE: "false"
        run: |
          cargo install sqlx-cli --no-default-features --features rustls,postgres --locked
          cargo sqlx prepare --check -- --all-targets

      - name: Integration tests
        run: cargo test

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
